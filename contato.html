<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Meu Portfólio</div>
            <ul class="nav-links">
                <li><a href="sobre.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </div>
    </nav>

    <main class="content">
        <h1>Entre em Contato</h1>
        <p>Se você tem interesse em trabalhar comigo ou quer tirar alguma dúvida, envie uma mensagem através do formulário abaixo:</p>
        
        <br>

        <div id="feedback-message" class="feedback-box"></div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo">
            </div>
            
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="text" id="email" name="email" placeholder="seu.email@exemplo.com">
            </div>
            
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem aqui..."></textarea>
            </div>
            
            <button type="submit">Enviar Mensagem</button>
        </form>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.querySelector("form");

            form.addEventListener("submit", function (event) {
                // Impede o envio padrão do formulário (recarregar a página)
                event.preventDefault();

                // Captura os elementos e valores dos campos
                const nome = document.getElementById("nome").value.trim();
                const email = document.getElementById("email").value.trim();
                const mensagem = document.getElementById("mensagem").value.trim();
                const feedbackMessage = document.getElementById("feedback-message");

                // Expressão regular para validar o formato do e-mail
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                // Limpa mensagens de feedback anteriores e classes de estilo
                feedbackMessage.textContent = "";
                feedbackMessage.className = "feedback-box";

                // 1. Validação de campos vazios
                if (nome === "" || email === "" || mensagem === "") {
                    exibirFeedback("Por favor, preencha todos os campos antes de enviar.", "error");
                    return;
                }

                // 2. Validação do formato do e-mail
                if (!emailRegex.test(email)) {
                    exibirFeedback("Por favor, insira um e-mail válido (exemplo: usuario@dominio.com).", "error");
                    return;
                }

                // 3. Simulação de envio com sucesso
                exibirFeedback("✉️ Mensagem enviada com sucesso!", "success");
                
                // Limpa os campos do formulário após o sucesso
                form.reset();
            });

            // Função auxiliar para exibir a mensagem na tela
            function exibirFeedback(texto, tipo) {
                const feedbackMessage = document.getElementById("feedback-message");
                feedbackMessage.textContent = texto;
                feedbackMessage.classList.add("show", tipo);
            }
        });
    </script>
</body>
</html>
